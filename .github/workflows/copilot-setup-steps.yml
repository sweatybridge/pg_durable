name: "Copilot Setup Steps"

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    timeout-minutes: 59
    environment: copilot

    # Least privilege; checkout needs contents:read.
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          submodules: false

      - name: Initialize private submodule duroxide-pg-opt
        run: |
          test -n "${{ secrets.DUROXIDE_PG_OPT_TOKEN }}"
          git -c url."https://x-access-token:${{ secrets.DUROXIDE_PG_OPT_TOKEN }}@github.com/".insteadOf="https://github.com/" \
            submodule update --init --recursive

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies for pgrx
        run: |
          sudo apt-get update
          sudo apt-get install -y \
              pkg-config \
              libssl-dev \
              libclang-dev \
              clang \
              bison \
              flex \
              libreadline-dev \
              zlib1g-dev \
              libxml2-dev \
              libxslt1-dev \
              libicu-dev

      - name: Install cargo-pgrx
        run: cargo install cargo-pgrx --version 0.16.1 --locked

      - name: Initialize pgrx (PostgreSQL 17 and 18)
        run: cargo pgrx init --pg17 download --pg18 download

      - name: Verify pgrx installation
        run: cargo pgrx --version

      # Warm Cargo caches so later builds/tests are faster and more reliable.
      - name: Prefetch Rust dependencies
        run: |
          cargo fetch

      - name: Verify duroxide migrations match upstream
        run: ./scripts/verify-duroxide-migrations.sh